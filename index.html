<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Plan dietetyczny</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>Plan dietetyczny</h1>
        <p id="heroKcal">Cel: - kcal</p>
      </div>
      <label>
        Profil
        <select id="profileSelect"></select>
      </label>
    </header>

    <main class="container">
      <section class="card">
        <h2>Dane i pomiary</h2>
        <div class="grid">
          <label>Data <input id="mDate" type="date" /></label>
          <label>Płeć
            <select id="mGender">
              <option value="mezczyzna">Mężczyzna</option>
              <option value="kobieta">Kobieta</option>
            </select>
          </label>
          <label>Wiek <input id="mAge" type="number" min="10" max="120" /></label>
          <label>Waga (kg) <input id="mWeight" type="number" step="0.1" /></label>
          <label>Wzrost (cm) <input id="mHeight" type="number" step="1" /></label>
          <label>Talia (cm) <input id="mWaist" type="number" step="0.1" /></label>
          <label>Klatka/Biust (cm) <input id="mChest" type="number" step="0.1" /></label>
          <label>Biodra (cm) <input id="mHips" type="number" step="0.1" /></label>
        </div>
        <div class="row">
          <button id="saveMetricBtn">Zapisz pomiar</button>
          <strong id="bmiNow">BMI: -</strong>
        </div>
        <div id="metricsTable"></div>
      </section>

      <section class="card">
        <h2>Planer</h2>
        <div class="grid">
          <label>Tydzień <select id="weekSelect"></select></label>
          <label>Dzień <select id="daySelect"></select></label>
        </div>

        <div id="slotWrap" class="slot-wrap"></div>

        <p><strong id="dayKcal">Suma dnia: 0 kcal</strong> <span id="kcalDiff"></span></p>
      </section>

      <section class="card">
        <h2>Przepisy</h2>
        <input id="recipeSearch" type="text" placeholder="Szukaj przepisu..." />
        <div id="recipesList"></div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
