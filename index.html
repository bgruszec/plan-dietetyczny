<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Plan dietetyczny</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body data-theme="dark">
    <header class="topbar">
      <div>
        <h1>Plan dietetyczny</h1>
        <p id="heroKcal">Cel: - kcal</p>
      </div>
      <label>
        Profil
        <select id="profileSelect"></select>
      </label>
    </header>

    <nav class="main-menu" aria-label="Nawigacja aplikacji">
      <button class="menu-btn is-active" data-section="metrics" aria-selected="true">
        <span class="menu-btn-icon">PM</span>
        <span class="menu-btn-label">Pomiary</span>
      </button>
      <button class="menu-btn" data-section="planner" aria-selected="false">
        <span class="menu-btn-icon">PL</span>
        <span class="menu-btn-label">Planer</span>
      </button>
      <button class="menu-btn" data-section="plan" aria-selected="false">
        <span class="menu-btn-icon">28</span>
        <span class="menu-btn-label">Plan 28 dni</span>
      </button>
      <button class="menu-btn" data-section="recipes" aria-selected="false">
        <span class="menu-btn-icon">PR</span>
        <span class="menu-btn-label">Przepisy</span>
      </button>
      <button class="menu-btn" data-section="settings" aria-selected="false">
        <span class="menu-btn-icon">US</span>
        <span class="menu-btn-label">Ustawienia</span>
      </button>
    </nav>

    <main class="container">
      <section class="card app-section is-active" id="section-metrics">
        <h2>Dane i pomiary</h2>
        <div class="grid">
          <label>Data <input id="mDate" type="date" /></label>
          <label>Płeć
            <select id="mGender">
              <option value="mezczyzna">Mężczyzna</option>
              <option value="kobieta">Kobieta</option>
            </select>
          </label>
          <label>Wiek <input id="mAge" type="number" min="10" max="120" /></label>
          <label>Waga (kg) <input id="mWeight" type="number" step="0.1" /></label>
          <label>Wzrost (cm) <input id="mHeight" type="number" step="1" /></label>
          <label>Talia (cm) <input id="mWaist" type="number" step="0.1" /></label>
          <label>Klatka/Biust (cm) <input id="mChest" type="number" step="0.1" /></label>
          <label>Biodra (cm) <input id="mHips" type="number" step="0.1" /></label>
        </div>
        <div class="row">
          <button id="saveMetricBtn" class="btn">Zapisz pomiar</button>
          <strong id="bmiNow">BMI: -</strong>
        </div>
        <div id="metricsTable"></div>
      </section>

      <section class="card app-section" id="section-planner">
        <h2>Planer</h2>
        <div class="grid">
          <label>Tydzień <select id="weekSelect"></select></label>
          <label>Dzień <select id="daySelect"></select></label>
        </div>
        <div class="row">
          <button id="copyDayBtn" type="button">Kopiuj ten dzień na inny</button>
        </div>
        <div id="slotWrap" class="slot-wrap"></div>
        <p><strong id="dayKcal">Suma dnia: 0 kcal</strong> <span id="kcalDiff"></span></p>
      </section>

      <section class="card app-section" id="section-plan">
        <h2>Plan 28 dni</h2>
        <label>Filtr tygodnia
          <select id="weekFilter">
            <option value="all">Wszystkie</option>
            <option value="1">Tydzień 1</option>
            <option value="2">Tydzień 2</option>
            <option value="3">Tydzień 3</option>
            <option value="4">Tydzień 4</option>
          </select>
        </label>
        <div id="planTables"></div>
      </section>

      <section class="card app-section" id="section-recipes">
        <h2>Przepisy</h2>
        <input id="recipeSearch" type="text" placeholder="Szukaj przepisu..." />
        <div id="recipesList"></div>
      </section>

      <section class="card app-section" id="section-settings">
        <h2>Ustawienia</h2>
        <div class="grid">
          <label>Motyw
            <select id="themeSelect">
              <option value="dark">Ciemny</option>
              <option value="light">Jasny</option>
            </select>
          </label>
          <label>Docelowe kcal / dzień
            <input id="targetKcalInput" type="number" min="1000" max="6000" step="10" />
          </label>
        </div>
        <div class="row">
          <button id="saveSettingsBtn" class="btn">Zapisz ustawienia</button>
          <button id="resetPlannerBtn" type="button">Resetuj planer</button>
        </div>
        <p class="settings-note">Ustawienia dotyczą aktualnie wybranego profilu.</p>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
